<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg { fill: #f4f2ed; }
      .wall { fill: #222; }
      .room { fill: #d9e2e9; stroke: #4f5e6a; stroke-width: 3; }
      .hall { fill: #e8d9c8; stroke: #8a6f52; stroke-width: 3; }
      .label { font: 700 24px Arial, sans-serif; fill: #101418; }
      .dim { font: 600 20px Arial, sans-serif; fill: #2f3a43; }
      .title { font: 700 34px Arial, sans-serif; fill: #111; }
      .note { font: 500 18px Arial, sans-serif; fill: #33414d; }
      .line { stroke: #546170; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900" />

  <text class="title" x="60" y="66">Long Hallway Proportion Reference (Second Pass)</text>
  <text class="note" x="60" y="96">Hallway target: ~4 ft wide, ~28 ft long; side rooms sized to compact apartment proportions.</text>

  <!-- Bedroom -->
  <rect class="room" x="120" y="220" width="420" height="360" />
  <text class="label" x="210" y="410">Bedroom</text>
  <text class="dim" x="170" y="610">~12' x 14'</text>

  <!-- Hallway -->
  <rect class="hall" x="540" y="340" width="650" height="120" />
  <text class="label" x="760" y="412">Main Hallway</text>
  <text class="dim" x="760" y="492">~4' x 28'</text>

  <!-- Office -->
  <rect class="room" x="760" y="120" width="290" height="220" />
  <text class="label" x="845" y="250">Office</text>
  <text class="dim" x="815" y="290">~9' x 11'</text>

  <!-- Kitchen -->
  <rect class="room" x="760" y="460" width="340" height="280" />
  <text class="label" x="865" y="610">Kitchen</text>
  <text class="dim" x="860" y="650">~10' x 12'</text>

  <!-- Door openings -->
  <rect x="540" y="370" width="18" height="60" fill="#f4f2ed" />
  <rect x="900" y="340" width="80" height="18" fill="#f4f2ed" />
  <rect x="900" y="442" width="80" height="18" fill="#f4f2ed" />

  <!-- Dimension lines -->
  <line class="line" x1="540" y1="320" x2="1190" y2="320" />
  <line class="line" x1="540" y1="300" x2="540" y2="340" />
  <line class="line" x1="1190" y1="300" x2="1190" y2="340" />
  <text class="dim" x="820" y="292">~28 ft</text>

  <line class="line" x1="1220" y1="340" x2="1220" y2="460" />
  <line class="line" x1="1190" y1="340" x2="1220" y2="340" />
  <line class="line" x1="1190" y1="460" x2="1220" y2="460" />
  <text class="dim" x="1240" y="407">~4 ft</text>
</svg>
